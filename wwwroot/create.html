<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineQuiz — Create Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #111118;
            --card-hover: #1a1a26;
            --border: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: "DM Sans", sans-serif;
            color: #e2e2f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        .hero-glow {
            background: radial-gradient(
                ellipse 80% 40% at 50% 0%,
                rgba(99, 60, 255, 0.18) 0%,
                transparent 70%
            );
        }

        .logo {
            font-family: "Bebas Neue", sans-serif;
            letter-spacing: 0.06em;
        }

        nav {
            background: linear-gradient(
                to bottom,
                rgba(10, 10, 15, 0.98) 0%,
                rgba(10, 10, 15, 0) 100%
            );
        }

        .field-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }

        .field-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: #e2e2f0;
            font-family: "DM Sans", sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .field-input:focus {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 60, 255, 0.1);
        }

        select.field-input option {
            background: #111118;
        }

        textarea.field-input {
            resize: vertical;
            min-height: 90px;
        }

        .hero-text {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body id="create-root">
    <!-- Fixed Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between content">
        <a href="/admin.html" class="flex items-center gap-3">
            <span class="logo text-3xl text-white tracking-widest">CINEQUIZ</span>
            <span class="text-xs text-white/30 font-light hidden sm:block">/ movie trivia</span>
        </a>
        <button id="logout-btn" class="text-xs text-white border border-white/30 px-3 py-1 rounded-full hover:bg-white/10 transition-colors">Log out</button>
    </nav>

    <!-- Hero -->
    <div class="hero-glow content pt-28 pb-8 px-6 sm:px-10">
        <div class="hero-text max-w-2xl mx-auto">
            <p class="text-xs font-medium tracking-[0.3em] text-violet-400/80 mb-2 uppercase">Admin</p>
            <h1 class="logo text-6xl sm:text-7xl text-white leading-none">Create Quiz</h1>
        </div>
    </div>

    <!-- Form -->
    <main class="content max-w-2xl mx-auto px-6 sm:px-10 pb-24">
        <form id="create-quiz-form" class="fade-up flex flex-col gap-5" style="animation-delay: 0.2s;">

            <div>
                <label class="field-label" for="category">Category</label>
                <select id="category" name="category" class="field-input">
                    <option value="1">General Knowledge</option>
                    <option value="2">Horror</option>
                    <option value="3">Action</option>
                    <option value="4">Romance</option>
                </select>
            </div>

            <div>
                <label class="field-label" for="title">Title</label>
                <input type="text" id="title" name="title" required class="field-input" placeholder="Quiz title..." />
            </div>

            <div>
                <label class="field-label" for="description">Description</label>
                <textarea id="description" name="description" class="field-input" placeholder="Optional description..."></textarea>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="px-6 py-3 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-full transition-colors">Create Quiz</button>
            </div>
        </form>
    </main>

    <script src="/js/create.js"></script>
</body>
</html>
