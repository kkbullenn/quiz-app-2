<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — CineQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --card: #111118;
        --card-hover: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: #e2e2f0;
        min-height: 100vh;
        overflow-x: hidden;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.06em;
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(100%, 400px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 36px 32px;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      input {
        width: 100%;
        background: #0a0a0f;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        font: inherit;
        font-size: 0.9rem;
        color: #e2e2f0;
        transition: border-color 150ms ease;
        outline: none;
      }

      input:focus {
        border-color: rgba(139, 92, 246, 0.5);
      }

      .message.error {
        color: #f87171;
      }

      .message.success {
        color: #4ade80;
      }
    </style>
</head>
<body>
    <div class="card">
        <p class="logo text-4xl text-white mb-1">CINEQUIZ</p>
        <p class="text-white/40 text-sm font-light mb-8">Create an account to get started.</p>

        <form id="register-form" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label for="register-email" class="text-xs font-medium text-white/50 uppercase tracking-widest">Email</label>
                <input id="register-email" name="registerEmail" type="email" required />
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="register-password" class="text-xs font-medium text-white/50 uppercase tracking-widest">Password</label>
                <input id="register-password" name="registerPassword" type="password" required minlength="6" />
            </div>

            <button type="submit"
                class="mt-2 w-full py-3 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-full transition-colors">
                Register
            </button>
        </form>

        <a href="login.html"
            class="block text-center text-xs text-white/30 hover:text-white/60 transition-colors mt-5">
            Already have an account? Log In
        </a>

        <p id="form-message" class="message text-xs text-center mt-3" aria-live="polite"></p>
    </div>

    <script src="js/client.js"></script>
</body>
</html>
