<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizzes — CineQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --card: #111118;
        --card-hover: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
      }

      * { box-sizing: border-box; }

      body {
        background-color: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: #e2e2f0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .content { position: relative; z-index: 1; }

      .hero-glow {
        background: radial-gradient(
          ellipse 80% 40% at 50% 0%,
          rgba(99, 60, 255, 0.18) 0%,
          transparent 70%
        );
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.06em;
      }

      nav {
        background: linear-gradient(
          to bottom,
          rgba(10, 10, 15, 0.98) 0%,
          rgba(10, 10, 15, 0) 100%
        );
      }

      .quiz-link {
        display: block;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 24px;
        color: #e2e2f0;
        text-decoration: none;
        transition:
          transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.22s ease,
          background 0.2s ease;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .quiz-link:hover {
        transform: translateY(-4px) scale(1.02);
        background: var(--card-hover);
        box-shadow:
          0 16px 32px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .hero-text {
        opacity: 0;
        transform: translateY(16px);
        animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
</head>
<body>
    <!-- Fixed Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between content">
        <a href="/categories.html" class="flex items-center gap-3">
            <span class="logo text-3xl text-white tracking-widest">CINEQUIZ</span>
            <span class="text-xs text-white/30 font-light hidden sm:block">/ movie trivia</span>
        </a>
        <button id="logout-btn" class="text-xs text-white border border-white/30 px-3 py-1 rounded-full hover:bg-white/10 transition-colors">Log out</button>
    </nav>

    <!-- Hero -->
    <div class="hero-glow content pt-28 pb-8 px-6 sm:px-10">
        <div class="hero-text max-w-2xl mx-auto text-center">
            <p class="text-xs font-medium tracking-[0.3em] text-violet-400/80 mb-2 uppercase">Select a quiz</p>
            <h1 id="category-heading" class="logo text-6xl sm:text-7xl text-white leading-none mb-3"></h1>
            <p class="text-white/40 text-sm max-w-md font-light mx-auto">Choose a quiz below to test your knowledge.</p>
        </div>
    </div>

    <!-- Quiz list -->
    <main class="content max-w-2xl mx-auto px-6 sm:px-10 pb-24">
        <div id="quizzes-container" class="flex flex-col gap-4"></div>
    </main>

    <script src="js/quizzes.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
