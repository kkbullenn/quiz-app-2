<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question — CineQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #111118;
            --card-hover: #1a1a26;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: "DM Sans", sans-serif;
            color: #e2e2f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .hero-glow {
            background: radial-gradient(ellipse 80% 40% at 50% 0%,
                    rgba(99, 60, 255, 0.18) 0%,
                    transparent 70%);
        }

        .logo {
            font-family: "Bebas Neue", sans-serif;
            letter-spacing: 0.06em;
        }

        nav {
            background: linear-gradient(to bottom,
                    rgba(10, 10, 15, 0.98) 0%,
                    rgba(10, 10, 15, 0) 100%);
        }

        .video-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        .video-wrap iframe,
        .video-wrap video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .option-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition:
                transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.22s ease,
                background 0.2s ease;
            user-select: none;
        }

        .option-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: var(--card-hover);
            box-shadow:
                0 16px 32px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .option-card:active {
            transform: scale(0.97);
        }

        .option-card.selected {
            border-color: rgba(139, 92, 246, 0.6);
            background: rgba(99, 60, 255, 0.15);
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.4);
        }

        .option-label {
            font-family: "Bebas Neue", sans-serif;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            color: rgba(139, 92, 246, 0.8);
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between content">
        <div class="flex items-center gap-3">
            <span class="logo text-3xl text-white tracking-widest">CINEQUIZ</span>
            <span class="text-xs text-white/30 font-light hidden sm:block">/ movie trivia</span>
        </div>
        <button id="logout-btn"
            class="text-xs text-white border border-white/30 px-3 py-1 rounded-full hover:bg-white/10 transition-colors">Log
            out</button>
    </nav>

    <!-- Hero glow -->
    <div class="hero-glow content pt-28 pb-4 px-6 sm:px-10"></div>

    <!-- Main content -->
    <main class="content max-w-2xl mx-auto px-6 sm:px-10 pb-24">

        <!-- Video -->
        <div class="hidden fade-up video-wrap mb-6" style="animation-delay: 0.1s;">
            <iframe src="https://www.youtube-nocookie.com/embed/KrwkXPs4IbM?autoplay=1" frameborder="0"
                allowfullscreen></iframe>
        </div>

        <div class="hidden fade-up video-wrap mb-6" style="animation-delay: 0.1s;">
            <video src="/assets/TestVideo.mp4" controls></video>
        </div>

        <div class="fade-up mb-6" style="animation-delay: 0.2s; " >
            <img class="video-wrap" style="width:100%; height:100%; object-fit:cover; display:block;" src="/assets/pig.gif" alt="Pig">
        </div>



        <!-- Question -->
        <div class="fade-up mb-6" style="animation-delay: 0.2s;">
            <p class="text-xs font-medium tracking-[0.3em] text-violet-400/80 mb-1 uppercase">Question 1</p>
            <h2 class="logo text-4xl sm:text-5xl text-white leading-none">What is spotted in this video?</h2>
        </div>

        <!-- Options -->
        <ul class="fade-up grid grid-cols-1 sm:grid-cols-2 gap-3" style="animation-delay: 0.3s;">
            <li class="option-card px-5 py-4 flex items-center gap-4" onclick="selectOption(this)">
                <span class="option-label">A</span>
                <span class="text-sm font-medium text-white/80">Alien</span>
            </li>
            <li class="option-card px-5 py-4 flex items-center gap-4" onclick="selectOption(this)">
                <span class="option-label">B</span>
                <span class="text-sm font-medium text-white/80">Mothman</span>
            </li>
            <li class="option-card px-5 py-4 flex items-center gap-4" onclick="selectOption(this)">
                <span class="option-label">C</span>
                <span class="text-sm font-medium text-white/80">Bigfoot</span>
            </li>
            <li class="option-card px-5 py-4 flex items-center gap-4" onclick="selectOption(this)">
                <span class="option-label">D</span>
                <span class="text-sm font-medium text-white/80">Cat</span>
            </li>
        </ul>

        <div class="flex fade-up justify-center mt-8" style="animation-delay: 0.4s;">
            <button class="px-6 py-3 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-full transition-colors" onclick="submitAnswer()">Submit Answer</button>
        </div>

    </main>

    <script>
        function selectOption(el) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }
    </script>
</body>

</html>
