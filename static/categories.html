<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineQuiz — Movie Trivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --card: #111118;
        --card-hover: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: #e2e2f0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Subtle noise texture overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .content {
        position: relative;
        z-index: 1;
      }

      /* Hero gradient */
      .hero-glow {
        background: radial-gradient(
          ellipse 80% 40% at 50% 0%,
          rgba(99, 60, 255, 0.18) 0%,
          transparent 70%
        );
      }

      /* Logo */
      .logo {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.06em;
      }

      /* Category badge */
      .cat-badge {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.12em;
        font-size: 0.7rem;
      }

      /* Movie card */
      .movie-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        cursor: pointer;
        transition:
          transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.22s ease,
          opacity 0.15s ease,
          background 0.2s ease;
        flex-shrink: 0;
        user-select: none;
      }

      .movie-card:hover {
        transform: translateY(-6px) scale(1.02);
        background: var(--card-hover);
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .movie-card:active {
        transform: scale(0.97);
      }

      .movie-card.clicked {
        opacity: 0.38;
        transform: none;
        box-shadow: none;
        pointer-events: none;
      }

      /* Scroll row */
      .scroll-row {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 12px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }

      .scroll-row::-webkit-scrollbar {
        height: 4px;
      }
      .scroll-row::-webkit-scrollbar-track {
        background: transparent;
      }
      .scroll-row::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      /* Category section entrance animation */
      .cat-section {
        opacity: 0;
        transform: translateY(28px);
        animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Hero entrance */
      .hero-text {
        opacity: 0;
        transform: translateY(16px);
        animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }



      /* Nav */
      nav {
        background: linear-gradient(
          to bottom,
          rgba(10, 10, 15, 0.98) 0%,
          rgba(10, 10, 15, 0) 100%
        );
      }
    </style>
  </head>
  <body>
    <!-- Fixed Nav -->
    <nav
      class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between content"
    >
      <div class="flex items-center gap-3">
        <span class="logo text-3xl text-white tracking-widest">CINEQUIZ</span>
        <span class="text-xs text-white/30 font-light hidden sm:block"
          >/ movie trivia</span
        >
      </div>
      <button id="logout-btn" class="text-xs text-white border border-white/30 px-3 py-1 rounded-full hover:bg-white/10 transition-colors">Log out</button>
    </nav>

    <!-- Hero -->
    <div class="hero-glow content pt-28 pb-8 px-6 sm:px-10">
      <div class="hero-text max-w-5xl mx-auto text-center">
        <p class="text-xs font-medium tracking-[0.3em] text-violet-400/80 mb-2 uppercase">
          Pick your era. Prove your knowledge.
        </p>
        <h1 class="logo text-6xl sm:text-7xl text-white mb-3 leading-none">
          Movie Trivia
        </h1>
        <p class="text-white/40 text-sm max-w-md font-light mx-auto">From blockbusters to cult classics — test your knowledge across decades of cinema. </p>
      </div>
    </div>

    <!-- Categories -->
    <main class="content max-w-2xl mx-auto px-6 sm:px-10 pb-24">
      <div id="categories-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      </div>
    </main>

    <script src="js/client.js"></script>
  </body>
</html>
