<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineQuiz — Quiz List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --card: #111118;
        --card-hover: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
      }

      * { box-sizing: border-box; }

      body {
        background-color: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: #e2e2f0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .content { position: relative; z-index: 1; }

      .hero-glow {
        background: radial-gradient(
          ellipse 80% 40% at 50% 0%,
          rgba(99, 60, 255, 0.18) 0%,
          transparent 70%
        );
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.06em;
      }

      nav {
        background: linear-gradient(
          to bottom,
          rgba(10, 10, 15, 0.98) 0%,
          rgba(10, 10, 15, 0) 100%
        );
      }

      .quiz-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        transition:
          transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.22s ease,
          background 0.2s ease;
      }

      .quiz-card:hover {
        transform: translateY(-4px) scale(1.01);
        background: var(--card-hover);
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .cat-section {
        opacity: 0;
        transform: translateY(28px);
        animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .hero-text {
        opacity: 0;
        transform: translateY(16px);
        animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
</head>
<body>
    <!-- Fixed Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between content">
        <div class="flex items-center gap-3">
            <span class="logo text-3xl text-white tracking-widest">CINEQUIZ</span>
            <span class="text-xs text-white/30 font-light hidden sm:block">/ movie trivia</span>
        </div>
        <button id="logout-btn" class="text-xs text-white border border-white/30 px-3 py-1 rounded-full hover:bg-white/10 transition-colors">Log out</button>
    </nav>

    <!-- Hero -->
    <div class="hero-glow content pt-28 pb-8 px-6 sm:px-10">
        <div class="hero-text max-w-5xl mx-auto">
            <p class="text-xs font-medium tracking-[0.3em] text-violet-400/80 mb-2 uppercase">Manage your content</p>
            <div class="flex items-center justify-between flex-wrap gap-4">
                <h1 class="logo text-6xl sm:text-7xl text-white leading-none">Admin</h1>
                <h1 class="logo text-6xl sm:text-7xl text-white leading-none">Quiz List</h1>
                <button class="px-5 py-2.5 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-full transition-colors">Upload Quiz</button>
            </div>
        </div>
    </div>

    <!-- Quiz List -->
    <main class="content max-w-2xl mx-auto px-6 sm:px-10 pb-24">
        <div id="quiz-list" class="flex flex-col gap-4">
            <template>
                <div class="quiz-card cat-section p-6">
                    <div class="flex items-start justify-between gap-4">
                        <div>
                            <h3 class="logo text-2xl text-white leading-tight mb-1">Quiz Title</h3>
                            <p class="text-xs text-white/40 font-light">Number of Questions: 10</p>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button class="text-xs text-white border border-white/20 px-3 py-1.5 rounded-full hover:bg-white/10 transition-colors">Edit</button>
                            <button class="text-xs text-red-400 border border-red-400/30 px-3 py-1.5 rounded-full hover:bg-red-400/10 transition-colors">Delete</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>
</body>
</html>
