name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy repo to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/quiz-app-2
            git pull origin main
            docker stop quiz-app || true
            docker rm quiz-app || true
            docker rmi quiz-app-2 || true
            docker build -t quiz-app-2 .
            docker run -d -p 8080:8080 \
              -e "Jwt__Secret=${{ secrets.JWT_SECRET }}" \
              -e 'ConnectionStrings__Default=${{ secrets.DB_CONNECTION_STRING }}' \
              --name quiz-app \
              quiz-app-2
